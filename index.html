<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Acme&display=swap');
        *{
            margin: 0;
            padding: 0;
            text-decoration: none;
        }
        @import url('https://googleapis.com');
        body{
            height: 100vh;
            background-color: white;
            align-items: center;
            justify-content: center;
            display: flex;
        }
        .text{
            text-align: center;
            justify-content: center;
            line-height: 40px;
            letter-spacing:0px;
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div>
        <h1 class="text">
            Stress doesn't come from <span style="color:  rgba(255, 119, 233, 0.97) ;;">HARD WORK</span>,<br> Stress primarily comes from
            not taking<br> action over something that you can have<br> some control over,<br> So stress comes from
            Ignoring things that<br> you shouldn't be ignoring.
        </h1>
    </div>
</body>
</html>
